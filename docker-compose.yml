services:
  waf:
    build:
      context: ./waf
      dockerfile: Dockerfile
    container_name: waf
    ports:
      - "8443:8443"
    environment:
      - BACKEND_URL=http://backend:5000
      - WAF_MODE=blocking
      - DB_PATH=/data/waf.db
      - LOG_PATH=/data/events.jsonl
      - RATE_LIMIT=60
      - WAF_API_TOKEN=dNfts2G3P0xu1pxFndymxf37jZAjLDfO
      - DASHBOARD_PASSWORD=waf-admin-2026
      # ── Threat Intelligence (POKS TI) ──────────────────────
      - TI_ENABLED=true
      - TI_BASE_URL=http://10.135.126.10:8000
      - TI_SYNC_INTERVAL=300
      - TI_SCORE_THRESHOLD=50
      # ── Telegram уведомления ────────────────────────────────
      - TG_ENABLED=true
      - TG_BOT_TOKEN=8117519145:AAF9tLwawJC-KYbcQd2EeTr6js3isGMxDKE
      - TG_CHAT_ID=-5209220154
      # ── ELK / Elasticsearch (отправка инцидентов в SIEM) ────
      - ELK_ENABLED=true
      - ELK_URL=https://10.135.126.2:9200
      - ELK_USER=s_saliev
      - ELK_PASSWORD=SOC_Member_2026!
      - ELK_INDEX_PREFIX=waf-incidents
      - ELK_VERIFY_SSL=false
      # ── IP Whitelist для /waf-admin ─────────────────────────
      # Оставьте пустым чтобы разрешить всем, или укажите IP через запятую:
      # - ADMIN_IP_WHITELIST=10.135.125.10,10.11.10.3,172.18.0.1
      - ADMIN_IP_WHITELIST=
      # ── Шифрование секретов (опционально) ──────────────────
      # Если задан — WAF расшифрует secrets.enc.json при старте.
      # Значения из secrets.enc.json НЕ перезаписывают переменные выше.
      # Оставьте пустым если не используете зашифрованные секреты.
      - WAF_MASTER_KEY=
      - SECRETS_FILE=/run/secrets/secrets.enc.json
    volumes:
      - waf_data:/data
      # Монтируем зашифрованный файл секретов (если существует)
      # - ./secrets.enc.json:/run/secrets/secrets.enc.json:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    expose:
      - "5000"
    restart: unless-stopped

volumes:
  waf_data:
